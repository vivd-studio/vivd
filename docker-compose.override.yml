services:
  caddy:
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./packages/backend/static:/srv/default:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
      - docs
  backend:
    build:
      target: dev
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - STUDIO_MACHINE_PORT_START=3200
      # Use the same paths that Caddy uses (shared volumes from main docker-compose)
      # PUBLISHED_DIR, CADDY_SITES_DIR, CADDY_ADMIN_URL inherited from docker-compose.yml
    volumes:
      - ./packages/backend/projects:/app/projects
      # These are defined in docker-compose.yml and shared with Caddy
      # published_sites and caddy_sites volumes are inherited from main compose
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
    ports:
      - "3000:3000"
      - "3200-3299:3200-3299"
    develop:
      watch:
        - action: sync
          path: ./packages/backend
          target: /app/packages/backend
          ignore:
            - node_modules/
            - dist/
            - projects/
        - action: sync
          path: ./packages/cli
          target: /app/packages/cli
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/installed-plugins
          target: /app/packages/installed-plugins
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/plugin-analytics
          target: /app/packages/plugin-analytics
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/plugin-contact-form
          target: /app/packages/plugin-contact-form
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/plugin-newsletter
          target: /app/packages/plugin-newsletter
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/theme
          target: /app/packages/theme
          ignore:
            - node_modules/
        - action: rebuild
          path: ./packages/installed-plugins/package.json
        - action: rebuild
          path: ./packages/backend/package.json
        - action: rebuild
          path: ./packages/plugin-analytics/package.json
        - action: rebuild
          path: ./packages/plugin-contact-form/package.json
        - action: rebuild
          path: ./packages/plugin-newsletter/package.json
        - action: rebuild
          path: ./packages/cli/package.json
        - action: rebuild
          path: ./packages/shared/package.json
        - action: rebuild
          path: ./packages/shared/src
    command: npm run dev

    depends_on:
      postgres:
        condition: service_healthy
      scraper:
        condition: service_healthy

  frontend:
    build:
      target: dev
    command: npm run dev -- --host
    environment:
      - NODE_ENV=development
      - VITE_API_PROXY_TARGET=http://backend:3000
      - VITE_APP_ENV=${VITE_APP_ENV}
    develop:
      watch:
        - action: sync
          path: ./packages/frontend
          target: /app/packages/frontend
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/theme
          target: /app/packages/theme
          ignore:
            - node_modules/
        - action: sync
          path: ./packages/installed-plugins
          target: /app/packages/installed-plugins
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/plugin-analytics
          target: /app/packages/plugin-analytics
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/plugin-contact-form
          target: /app/packages/plugin-contact-form
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/plugin-newsletter
          target: /app/packages/plugin-newsletter
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/backend/src
          target: /app/packages/backend/src
        - action: rebuild
          path: ./packages/installed-plugins/package.json
        - action: rebuild
          path: ./packages/plugin-analytics/package.json
        - action: rebuild
          path: ./packages/plugin-contact-form/package.json
        - action: rebuild
          path: ./packages/plugin-newsletter/package.json
        - action: rebuild
          path: ./packages/frontend/package.json
        - action: rebuild
          path: ./packages/theme/package.json
        - action: rebuild
          path: ./packages/backend/package.json

  docs:
    build:
      context: .
      dockerfile: packages/docs/Dockerfile
      target: dev
    command: npm run dev
    environment:
      - VIVD_DOCS_SITE_URL=${VIVD_DOCS_SITE_URL:-http://docs.localhost}
    networks:
      - vivd-network
    develop:
      watch:
        - action: sync
          path: ./packages/docs
          target: /app/packages/docs
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/theme
          target: /app/packages/theme
          ignore:
            - node_modules/
        - action: rebuild
          path: ./packages/docs/package.json
        - action: rebuild
          path: ./packages/theme/package.json
  postgres:
    ports:
      - "5432:5432"

  scraper:
    command: npm run dev
    networks:
      - vivd-network
    ports:
      - "3001:3001"
    develop:
      watch:
        - action: sync
          path: ./packages/scraper
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./packages/scraper/package.json
