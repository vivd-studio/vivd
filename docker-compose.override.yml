services:
  backend:
    build:
      target: dev
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend/generated:/app/generated
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - node_modules/
            - dist/
            - generated/
        - action: rebuild
          path: ./backend/package.json
    command: npm run dev

  frontend:
    build:
      target: dev
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    environment:
      - NODE_ENV=development
      - VITE_API_PROXY_TARGET=http://backend:3000
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./frontend/package.json
