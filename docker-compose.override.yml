services:
  caddy:
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./backend/static:/srv/default:ro
    ports:
      - "80:80"
      - "443:443"
  backend:
    build:
      target: dev
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      # Use the same paths that Caddy uses (shared volumes from main docker-compose)
      # PUBLISHED_DIR, CADDY_SITES_DIR, CADDY_ADMIN_URL inherited from docker-compose.yml
    volumes:
      - ./backend/projects:/app/projects
      # These are defined in docker-compose.yml and shared with Caddy
      # published_sites and caddy_sites volumes are inherited from main compose
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - node_modules/
            - dist/
            - projects/
        - action: rebuild
          path: ./backend/package.json
    command: npm run dev

    depends_on:
      - scraper

  frontend:
    build:
      target: dev
    command: npm run dev -- --host
    environment:
      - NODE_ENV=development
      - VITE_API_PROXY_TARGET=http://backend:3000
      - VITE_APP_ENV=${VITE_APP_ENV}
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app/frontend
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./frontend/package.json
  postgres:
    ports:
      - "5432:5432"

  # Separate DB for control panel (keeps it isolated from main vivd DB)
  control-panel-postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: control_panel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d control_panel"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - control_panel_postgres_data:/var/lib/postgresql/data
    networks:
      - vivd-network

  scraper:
    build:
      context: ./scraper
    environment:
      - PORT=3001
      - MAX_BROWSERS=2
      - SCRAPER_API_KEY=${SCRAPER_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    networks:
      - vivd-network
    platform: linux/amd64
    ports:
      - "3001:3001"
    develop:
      watch:
        - action: sync
          path: ./scraper
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./scraper/package.json

  # Control Panel Services
  control-panel-backend:
    build:
      context: ./control-panel/backend
      dockerfile: Dockerfile
      target: backend-deps
    command: npm run dev
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@control-panel-postgres:5432/control_panel
      - PORT=3100
      - NODE_ENV=development
      - DOKPLOY_URL=${DOKPLOY_URL}
      - DOKPLOY_API_KEY=${DOKPLOY_API_KEY}
      - SHARED_OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SHARED_GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SHARED_GITHUB_TOKEN=${GITHUB_TOKEN}
      - SHARED_GITHUB_ORG=${GITHUB_ORG:-vivd-studio}
      - SHARED_OPENCODE_MODEL=${OPENCODE_MODEL}
      - DEFAULT_SCRAPER_URL=http://scraper:3001
      - DEFAULT_SCRAPER_API_KEY=${SCRAPER_API_KEY}
    volumes:
      - ./control-panel/backend:/app
      - /app/node_modules
    ports:
      - "3100:3100"
    networks:
      - vivd-network
    depends_on:
      control-panel-postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./control-panel/backend
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./control-panel/backend/package.json

  control-panel-frontend:
    build:
      context: ./control-panel/frontend
      dockerfile: Dockerfile
      target: build
    command: npm run dev -- --host
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://control-panel-backend:3100
    volumes:
      - ./control-panel/frontend:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    networks:
      - vivd-network
    depends_on:
      - control-panel-backend
    develop:
      watch:
        - action: sync
          path: ./control-panel/frontend
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./control-panel/frontend/package.json

volumes:
  control_panel_postgres_data: {}
