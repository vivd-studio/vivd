services:
  caddy:
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./packages/backend/static:/srv/default:ro
    ports:
      - "80:80"
      - "443:443"
  backend:
    build:
      target: dev
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      # Use the same paths that Caddy uses (shared volumes from main docker-compose)
      # PUBLISHED_DIR, CADDY_SITES_DIR, CADDY_ADMIN_URL inherited from docker-compose.yml
    volumes:
      - ./packages/backend/projects:/app/projects
      # These are defined in docker-compose.yml and shared with Caddy
      # published_sites and caddy_sites volumes are inherited from main compose
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: ./packages/backend
          target: /app/packages/backend
          ignore:
            - node_modules/
            - dist/
            - projects/
        - action: rebuild
          path: ./packages/backend/package.json
        - action: rebuild
          path: ./packages/shared/package.json
        - action: rebuild
          path: ./packages/shared/src
    command: npm run dev

    depends_on:
      - scraper

  frontend:
    build:
      target: dev
    command: npm run dev -- --host
    environment:
      - NODE_ENV=development
      - VITE_API_PROXY_TARGET=http://backend:3000
      - VITE_APP_ENV=${VITE_APP_ENV}
    develop:
      watch:
        - action: sync
          path: ./packages/frontend
          target: /app/packages/frontend
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/backend/src
          target: /app/packages/backend/src
        - action: rebuild
          path: ./packages/frontend/package.json
        - action: rebuild
          path: ./packages/backend/package.json
  postgres:
    ports:
      - "5432:5432"

  scraper:
    build:
      context: ./packages/scraper
    environment:
      - PORT=3001
      - MAX_BROWSERS=2
      - SCRAPER_API_KEY=${SCRAPER_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Residential proxy config (optional - set in .env to enable)
      - PROXY_HOST=${PROXY_HOST:-}
      - PROXY_PORT=${PROXY_PORT:-823}
      - PROXY_USERNAME=${PROXY_USERNAME:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}
    networks:
      - vivd-network
    platform: linux/amd64
    ports:
      - "3001:3001"
    develop:
      watch:
        - action: sync
          path: ./packages/scraper
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./packages/scraper/package.json
