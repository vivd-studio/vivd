<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, sans-serif;
        background: #fafafa;
        color: #333;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .code {
        font-size: 6rem;
        font-weight: 200;
        color: #ccc;
        line-height: 1;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 500;
        margin-bottom: 0.75rem;
        color: #222;
      }
      p {
        color: #666;
        margin-bottom: 2rem;
        line-height: 1.5;
      }
      a {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: #333;
        color: #fff;
        text-decoration: none;
        border-radius: 6px;
        font-size: 0.9rem;
        transition: background 0.2s;
      }
      a:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <a href="/">Go to homepage</a>
    </div>
  </body>
</html>
