# Standalone deployment for production scraper service
# Deploy this separately - one instance serves multiple vivd-studio instances

services:
  scraper:
    build: .
    restart: unless-stopped
    environment:
      - MAX_BROWSERS=${MAX_BROWSERS:-4}
      - MAX_CONCURRENT_SCRAPES=${MAX_CONCURRENT_SCRAPES:-4}
      - PORT=3001
      - SCRAPER_API_KEY=${SCRAPER_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Residential proxy config (optional - set in .env to enable)
      - PROXY_HOST=${PROXY_HOST:-}
      - PROXY_PORT=${PROXY_PORT:-823}
      - PROXY_USERNAME=${PROXY_USERNAME:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}
