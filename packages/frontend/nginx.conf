server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Prevent nginx from generating absolute redirects with internal hostname
    absolute_redirect off;

    # Fingerprinted frontend assets can be cached aggressively.
    location /vivd-studio/assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The SPA shell must stay fresh so browsers do not hold onto an older app
    # entrypoint after deploys or protocol/origin changes.
    location = /vivd-studio {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /vivd-studio/index.html;
    }

    location = /vivd-studio/ {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /vivd-studio/index.html;
    }

    # Serve Vivd Studio app - SPA routing
    # Files are in /usr/share/nginx/html/vivd-studio
    # Works with or without trailing slash (Vite uses absolute paths)
    location /vivd-studio {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /vivd-studio/index.html;
    }
}
