name: Reusable Validate

on:
  workflow_call:
    inputs:
      ref:
        description: "Optional git ref to validate"
        required: false
        type: string
      run_studio_image_smoke:
        description: "Whether to build and smoke-test the Studio production image"
        required: false
        default: true
        type: boolean
      require_model_roundtrip:
        description: "Whether Studio image smoke must run prompt round-trips on configured model tiers"
        required: false
        default: false
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 23
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Studio Runtime Regression Tests
        run: npm run test:run -w @vivd/studio -- server/http/studioAuth.test.ts server/httpRoutes/runtime.test.ts client/src/components/chat/ChatContext.followup.test.tsx

      - name: Backend Studio Runtime Auth And Drift Regression Tests
        run: npm run test:run -w @vivd/backend -- studio_api_router.test.ts trpc_context_org_procedure.test.ts fly_lifecycle.test.ts fly_provider_reconcile.test.ts fly_provider_orchestration.test.ts docker_provider.test.ts local_provider_orchestration.test.ts

      - name: Frontend Studio Host Regression Tests
        run: npm run test:run -w @vivd/frontend -- src/app/router/guards.test.tsx src/hooks/useStudioHostRuntime.test.ts src/pages/EmbeddedStudio.test.tsx

      - name: Set up Docker Buildx
        if: ${{ inputs.run_studio_image_smoke }}
        uses: docker/setup-buildx-action@v3

      - name: Build vivd-studio validate image
        if: ${{ inputs.run_studio_image_smoke }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/studio/Dockerfile
          target: prod
          platforms: linux/amd64
          load: true
          tags: vivd-studio:validate-smoke
          cache-from: type=gha,scope=studio
          cache-to: type=gha,mode=max,scope=studio

      - name: Smoke test vivd-studio validate image
        if: ${{ inputs.run_studio_image_smoke }}
        env:
          STUDIO_IMAGE: vivd-studio:validate-smoke
          VIVD_STUDIO_SMOKE_REQUIRE_MODELS: ${{ inputs.require_model_roundtrip }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT || secrets.GOOGLE_CLOUD_PROJECT }}
          VERTEX_LOCATION: ${{ vars.VERTEX_LOCATION || secrets.VERTEX_LOCATION || 'global' }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          VIVD_GOOGLE_APPLICATION_CREDENTIALS_PATH: ${{ secrets.VIVD_GOOGLE_APPLICATION_CREDENTIALS_PATH }}
          OPENCODE_MODEL_STANDARD: ${{ vars.OPENCODE_MODEL_STANDARD || secrets.OPENCODE_MODEL_STANDARD }}
          OPENCODE_MODEL_ADVANCED: ${{ vars.OPENCODE_MODEL_ADVANCED || secrets.OPENCODE_MODEL_ADVANCED }}
          OPENCODE_MODEL_PRO: ${{ vars.OPENCODE_MODEL_PRO || secrets.OPENCODE_MODEL_PRO }}
        run: node ./scripts/studio-image-smoke.mjs
