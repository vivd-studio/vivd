name: Build and Publish Container Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to use for images (e.g., v1.0.0)"
        required: true

env:
  REGISTRY: ghcr.io
  # Hardcoded to vivd-studio org (repo is in personal account but images go to org)
  IMAGE_PREFIX: ghcr.io/vivd-studio

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi

          VERSION_NO_V="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_no_v=${VERSION_NO_V}" >> $GITHUB_OUTPUT

      - name: Determine changed images
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_TAG="${{ steps.tag.outputs.version }}"
          CURRENT_SHA="$(git rev-list -n 1 "$CURRENT_TAG")"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${CURRENT_SHA}^" 2>/dev/null || true)"

          build_studio=false
          build_server=false
          build_ui=false
          build_caddy=false

          mark_all_apps() {
            build_studio=true
            build_server=true
            build_ui=true
          }

          mark_all_images() {
            mark_all_apps
            build_caddy=true
          }

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found. Building all images."
            mark_all_images
          else
            echo "Diff range: ${PREVIOUS_TAG}..${CURRENT_SHA}"
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              echo "Changed: $file"
              case "$file" in
                package.json|package-lock.json|.npmrc)
                  mark_all_apps
                  ;;
                packages/shared/*)
                  mark_all_apps
                  ;;
                packages/backend/package.json|packages/frontend/package.json|packages/studio/package.json|packages/scraper/package.json|packages/theme/package.json)
                  mark_all_apps
                  ;;
                packages/backend/*)
                  build_server=true
                  build_ui=true
                  ;;
                packages/frontend/*)
                  build_ui=true
                  ;;
                packages/studio/*)
                  build_studio=true
                  ;;
                packages/theme/*)
                  build_studio=true
                  build_ui=true
                  ;;
                caddy/*|Caddyfile)
                  build_caddy=true
                  ;;
                docs/*|README.md|LICENSE|AGENTS.md|.gitignore|.dockerignore|Caddyfile.dev|docker-compose.yml|docker-compose.override.yml|docker-compose.prod.yml|docker-compose.self-hosted.yml|.github/*)
                  ;;
                *)
                  echo "Unclassified path '$file' detected. Building all images for safety."
                  mark_all_images
                  ;;
              esac
            done < <(git diff --name-only "${PREVIOUS_TAG}..${CURRENT_SHA}")
          fi

          any=false
          if [ "$build_studio" = true ] || [ "$build_server" = true ] || [ "$build_ui" = true ] || [ "$build_caddy" = true ]; then
            any=true
          fi

          echo "build_studio=$build_studio" >> "$GITHUB_OUTPUT"
          echo "build_server=$build_server" >> "$GITHUB_OUTPUT"
          echo "build_ui=$build_ui" >> "$GITHUB_OUTPUT"
          echo "build_caddy=$build_caddy" >> "$GITHUB_OUTPUT"
          echo "any=$any" >> "$GITHUB_OUTPUT"

          {
            echo "### Changed image selection"
            echo "- previous_tag: ${PREVIOUS_TAG:-<none>}"
            echo "- build_studio: $build_studio"
            echo "- build_server: $build_server"
            echo "- build_ui: $build_ui"
            echo "- build_caddy: $build_caddy"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build and push vivd-studio
        if: steps.changes.outputs.build_studio == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/studio/Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vivd-studio:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/vivd-studio:${{ steps.tag.outputs.version_no_v }}
            ${{ env.IMAGE_PREFIX }}/vivd-studio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push vivd-server
        if: steps.changes.outputs.build_server == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/backend/Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vivd-server:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/vivd-server:${{ steps.tag.outputs.version_no_v }}
            ${{ env.IMAGE_PREFIX }}/vivd-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push vivd-ui
        if: steps.changes.outputs.build_ui == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/frontend/Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vivd-ui:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/vivd-ui:${{ steps.tag.outputs.version_no_v }}
            ${{ env.IMAGE_PREFIX }}/vivd-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push vivd-caddy
        if: steps.changes.outputs.build_caddy == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./caddy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vivd-caddy:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/vivd-caddy:${{ steps.tag.outputs.version_no_v }}
            ${{ env.IMAGE_PREFIX }}/vivd-caddy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy deployments
        if: steps.changes.outputs.any == 'true'
        run: |
          # Support multiple compose IDs (comma-separated)
          # e.g., DOKPLOY_COMPOSE_IDS="abc123,def456,ghi789"
          IFS=',' read -ra COMPOSE_IDS <<< "${{ secrets.DOKPLOY_COMPOSE_IDS }}"

          for COMPOSE_ID in "${COMPOSE_IDS[@]}"; do
            COMPOSE_ID=$(echo "$COMPOSE_ID" | xargs)  # Trim whitespace
            if [ -n "$COMPOSE_ID" ]; then
              echo "Triggering redeploy for compose: $COMPOSE_ID"
              curl -X POST "${{ secrets.DOKPLOY_URL }}/api/compose.redeploy" \
                -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
                -H "Content-Type: application/json" \
                -d "{\"composeId\": \"$COMPOSE_ID\"}" \
                --fail --silent --show-error
              echo "✓ Deployment triggered for $COMPOSE_ID"
            fi
          done
