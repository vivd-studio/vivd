name: Build and Publish Container Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to use for images (e.g., v1.0.0)"
        required: true

env:
  REGISTRY: ghcr.io
  # Hardcoded to vivd-studio org (repo is in personal account but images go to org)
  IMAGE_PREFIX: ghcr.io/vivd-studio

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push vivd-server
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vivd-server:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/vivd-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push vivd-ui
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vivd-ui:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/vivd-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push vivd-caddy
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./caddy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vivd-caddy:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/vivd-caddy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy deployment
        run: |
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error
        env:
          # Webhook URL stored as secret for security
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
