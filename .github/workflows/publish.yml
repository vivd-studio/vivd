name: Build and Publish Container Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to use for images (e.g., v1.0.0)"
        required: true
      skip_fly_release_smoke:
        description: "Skip the Fly release smoke job for this run"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  # Hardcoded to vivd-studio org (repo is in personal account but images go to org)
  IMAGE_PREFIX: ghcr.io/vivd-studio

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.tag.outputs.version }}
      version_no_v: ${{ steps.tag.outputs.version_no_v }}
      previous_tag: ${{ steps.changes.outputs.previous_tag }}
      build_builder: ${{ steps.changes.outputs.build_builder }}
      build_studio: ${{ steps.changes.outputs.build_studio }}
      build_server: ${{ steps.changes.outputs.build_server }}
      build_ui: ${{ steps.changes.outputs.build_ui }}
      build_docs: ${{ steps.changes.outputs.build_docs }}
      build_scraper: ${{ steps.changes.outputs.build_scraper }}
      build_caddy: ${{ steps.changes.outputs.build_caddy }}
      skip_fly_release_smoke: ${{ steps.publish_flags.outputs.skip_fly_release_smoke }}
      any: ${{ steps.changes.outputs.any }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi

          VERSION_NO_V="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_no_v=${VERSION_NO_V}" >> $GITHUB_OUTPUT

      - name: Determine publish flags
        id: publish_flags
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_TAG="${{ steps.tag.outputs.version }}"
          SKIP_FLY_RELEASE_SMOKE=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.skip_fly_release_smoke }}" = "true" ]; then
            SKIP_FLY_RELEASE_SMOKE=true
          else
            TAG_OBJECT_TYPE="$(git cat-file -t "$CURRENT_TAG" 2>/dev/null || true)"
            if [ "$TAG_OBJECT_TYPE" = "tag" ]; then
              TAG_CONTENTS="$(git for-each-ref "refs/tags/$CURRENT_TAG" --format='%(contents)')"
              if printf '%s\n' "$TAG_CONTENTS" | grep -q '^publish\.skip_fly_release_smoke=true$'; then
                SKIP_FLY_RELEASE_SMOKE=true
              fi
            fi
          fi

          echo "skip_fly_release_smoke=${SKIP_FLY_RELEASE_SMOKE}" >> "$GITHUB_OUTPUT"

          {
            echo "### Publish flags"
            echo "- skip_fly_release_smoke: ${SKIP_FLY_RELEASE_SMOKE}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Determine changed images
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_TAG="${{ steps.tag.outputs.version }}"
          CURRENT_SHA="$(git rev-list -n 1 "$CURRENT_TAG")"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${CURRENT_SHA}^" 2>/dev/null || true)"

          build_studio=false
          build_builder=false
          build_server=false
          build_ui=false
          build_docs=false
          build_scraper=false
          build_caddy=false

          mark_all_node_images() {
            build_studio=true
            build_builder=true
            build_server=true
            build_ui=true
            build_docs=true
          }

          mark_all_images() {
            mark_all_node_images
            build_scraper=true
            build_caddy=true
          }

          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Release tag push detected. Building all images unconditionally."
            mark_all_images
          elif [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found. Building all images."
            mark_all_images
          else
            echo "Diff range: ${PREVIOUS_TAG}..${CURRENT_SHA}"
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              echo "Changed: $file"
              case "$file" in
                package.json|package-lock.json|.npmrc)
                  mark_all_node_images
                  ;;
                packages/shared/*)
                  build_studio=true
                  build_builder=true
                  build_server=true
                  build_ui=true
                  ;;
                packages/builder/*)
                  build_builder=true
                  build_server=true
                  ;;
                packages/backend/*)
                  build_server=true
                  build_ui=true
                  ;;
                packages/frontend/*)
                  build_ui=true
                  ;;
                packages/studio/*)
                  build_studio=true
                  ;;
                packages/docs/*)
                  build_docs=true
                  ;;
                packages/scraper/*)
                  build_scraper=true
                  ;;
                packages/theme/*)
                  build_studio=true
                  build_ui=true
                  build_docs=true
                  ;;
                caddy/*|Caddyfile)
                  build_caddy=true
                  ;;
                docs/*|README.md|LICENSE|AGENTS.md|.gitignore|.dockerignore|Caddyfile.dev|docker-compose.yml|docker-compose.override.yml|docker-compose.prod.yml|docker-compose.self-hosted.yml|.github/*)
                  ;;
                *)
                  echo "Unclassified path '$file' detected. Building all images for safety."
                  mark_all_images
                  ;;
              esac
            done < <(git diff --name-only "${PREVIOUS_TAG}..${CURRENT_SHA}")
          fi

          any=false
          if [ "$build_studio" = true ] || [ "$build_builder" = true ] || [ "$build_server" = true ] || [ "$build_ui" = true ] || [ "$build_docs" = true ] || [ "$build_scraper" = true ] || [ "$build_caddy" = true ]; then
            any=true
          fi

          echo "build_studio=$build_studio" >> "$GITHUB_OUTPUT"
          echo "build_builder=$build_builder" >> "$GITHUB_OUTPUT"
          echo "build_server=$build_server" >> "$GITHUB_OUTPUT"
          echo "build_ui=$build_ui" >> "$GITHUB_OUTPUT"
          echo "build_docs=$build_docs" >> "$GITHUB_OUTPUT"
          echo "build_scraper=$build_scraper" >> "$GITHUB_OUTPUT"
          echo "build_caddy=$build_caddy" >> "$GITHUB_OUTPUT"
          echo "any=$any" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

          {
            echo "### Changed image selection"
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "- mode: full release rebuild on tag push"
            else
              echo "- mode: selective rebuild from diff"
            fi
            echo "- previous_tag: ${PREVIOUS_TAG:-<none>}"
            echo "- build_studio: $build_studio"
            echo "- build_builder: $build_builder"
            echo "- build_server: $build_server"
            echo "- build_ui: $build_ui"
            echo "- build_docs: $build_docs"
            echo "- build_scraper: $build_scraper"
            echo "- build_caddy: $build_caddy"
          } >> "$GITHUB_STEP_SUMMARY"

  validate-release:
    needs: detect-changes
    if: needs.detect-changes.outputs.any == 'true'
    uses: ./.github/workflows/reusable-validate.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
      run_studio_image_smoke: false
    secrets: inherit

  build-studio:
    needs: [detect-changes, validate-release]
    if: needs.detect-changes.outputs.build_studio == 'true'
    runs-on: ubuntu-latest
    outputs:
      candidate_tag: ${{ steps.candidate_tag.outputs.tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 23
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Define vivd-studio candidate tag
        id: candidate_tag
        run: |
          echo "tag=${{ env.IMAGE_PREFIX }}/vivd-studio:candidate-${{ needs.detect-changes.outputs.version_no_v }}-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build vivd-studio release candidate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/studio/Dockerfile
          target: prod
          platforms: linux/amd64
          load: true
          build-args: |
            VIVD_IMAGE_VERSION=${{ needs.detect-changes.outputs.version }}
            VIVD_IMAGE_REVISION=${{ github.sha }}
          tags: vivd-studio:release-smoke
          cache-from: type=gha,scope=studio
          cache-to: type=gha,mode=max,scope=studio

      - name: Smoke test vivd-studio release candidate
        env:
          STUDIO_IMAGE: vivd-studio:release-smoke
          VIVD_STUDIO_SMOKE_REQUIRE_MODELS: true
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT || secrets.GOOGLE_CLOUD_PROJECT }}
          VERTEX_LOCATION: ${{ vars.VERTEX_LOCATION || secrets.VERTEX_LOCATION || 'global' }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          VIVD_GOOGLE_APPLICATION_CREDENTIALS_PATH: ${{ secrets.VIVD_GOOGLE_APPLICATION_CREDENTIALS_PATH }}
          OPENCODE_MODEL_STANDARD: ${{ vars.OPENCODE_MODEL_STANDARD || secrets.OPENCODE_MODEL_STANDARD }}
          OPENCODE_MODEL_ADVANCED: ${{ vars.OPENCODE_MODEL_ADVANCED || secrets.OPENCODE_MODEL_ADVANCED }}
          OPENCODE_MODEL_PRO: ${{ vars.OPENCODE_MODEL_PRO || secrets.OPENCODE_MODEL_PRO }}
        run: node ./scripts/studio-image-smoke.mjs

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Tag and push smoked vivd-studio candidate image
        env:
          CANDIDATE_TAG: ${{ steps.candidate_tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          docker tag vivd-studio:release-smoke "$CANDIDATE_TAG"
          docker push "$CANDIDATE_TAG"

  studio-opencode-revert-smoke:
    needs: [build-studio]
    if: needs.build-studio.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 23
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Pull vivd-studio candidate image for revert smoke
        id: pull_revert_smoke_image
        env:
          CANDIDATE_TAG: ${{ needs.build-studio.outputs.candidate_tag }}
        shell: bash
        run: |
          set -euo pipefail

          docker pull "$CANDIDATE_TAG"

      - name: Smoke test OpenCode rehydrate + revert on the built image
        id: revert_smoke
        if: steps.pull_revert_smoke_image.outcome == 'success'
        env:
          STUDIO_IMAGE: ${{ needs.build-studio.outputs.candidate_tag }}
          VIVD_STUDIO_REVERT_SMOKE_TIMEOUT_MS: "480000"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT || secrets.GOOGLE_CLOUD_PROJECT }}
          VERTEX_LOCATION: ${{ vars.VERTEX_LOCATION || secrets.VERTEX_LOCATION || 'global' }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          VIVD_GOOGLE_APPLICATION_CREDENTIALS_PATH: ${{ secrets.VIVD_GOOGLE_APPLICATION_CREDENTIALS_PATH }}
          OPENCODE_MODEL_STANDARD: ${{ vars.OPENCODE_MODEL_STANDARD || secrets.OPENCODE_MODEL_STANDARD }}
          OPENCODE_MODEL_ADVANCED: ${{ vars.OPENCODE_MODEL_ADVANCED || secrets.OPENCODE_MODEL_ADVANCED }}
          OPENCODE_MODEL_PRO: ${{ vars.OPENCODE_MODEL_PRO || secrets.OPENCODE_MODEL_PRO }}
        run: npm run studio:image:revert-smoke

      - name: Summarize OpenCode revert smoke result
        if: always()
        env:
          PULL_OUTCOME: ${{ steps.pull_revert_smoke_image.outcome }}
          SMOKE_OUTCOME: ${{ steps.revert_smoke.outcome }}
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "### OpenCode revert release gate"
            echo "- image_pull: ${PULL_OUTCOME:-skipped}"
            echo "- revert_smoke: ${SMOKE_OUTCOME:-skipped}"
          } >> "$GITHUB_STEP_SUMMARY"

  studio-fly-prod-shape-smoke:
    needs: [detect-changes, build-studio, deploy]
    if: needs.build-studio.result == 'success' && needs.deploy.result == 'success' && needs.detect-changes.outputs.skip_fly_release_smoke != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FLY_STUDIO_PORT_START: 3100
      FLY_STUDIO_CPU_KIND: performance
      FLY_STUDIO_CPUS: 1
      FLY_STUDIO_MEMORY_MB: 4096
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 23
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Validate Fly prod-shape smoke configuration
        id: validate_config
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_STUDIO_APP: ${{ vars.FLY_STUDIO_VALIDATE_APP || secrets.FLY_STUDIO_VALIDATE_APP }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "::error::Missing FLY_API_TOKEN secret for Fly release validation."
            exit 1
          fi

          if [ -z "${FLY_STUDIO_APP}" ]; then
            echo "::error::Missing FLY_STUDIO_VALIDATE_APP repo variable/secret for Fly release validation."
            exit 1
          fi

      - name: Fly prod-shape reconcile + wake + auth release smoke
        id: fly_prod_shape
        env:
          VIVD_RUN_FLY_PROD_SHAPE_SMOKE_TESTS: "1"
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_STUDIO_APP: ${{ vars.FLY_STUDIO_VALIDATE_APP || secrets.FLY_STUDIO_VALIDATE_APP }}
          VIVD_FLY_TEST_IMAGE: ${{ needs.build-studio.outputs.candidate_tag }}
          VIVD_FLY_TEST_DRIFT_IMAGE: ${{ format('{0}/vivd-studio:{1}', env.IMAGE_PREFIX, vars.FLY_STUDIO_RECONCILE_BASELINE_TAG || 'v1.1.51-repro.2') }}
          VIVD_FLY_PROD_SHAPE_WAKE_EXPECT_MAX_MS: "6000"
        run: npm run test:integration -w @vivd/backend -- test/integration/fly_prod_shape_reconcile_wake_auth.test.ts

      - name: Summarize Fly prod-shape smoke result
        if: always()
        env:
          CONFIG_OUTCOME: ${{ steps.validate_config.outcome }}
          PROD_SHAPE_OUTCOME: ${{ steps.fly_prod_shape.outcome }}
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "### Fly Studio prod-shape release signal"
            echo "- config: ${CONFIG_OUTCOME:-skipped}"
            echo "- prod_shape_smoke: ${PROD_SHAPE_OUTCOME:-skipped}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-studio:
    needs: [detect-changes, build-studio, studio-opencode-revert-smoke]
    if: always() && needs.detect-changes.outputs.build_studio == 'true' && needs.build-studio.result == 'success' && needs.studio-opencode-revert-smoke.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Publish smoked vivd-studio image
        env:
          CANDIDATE_TAG: ${{ needs.build-studio.outputs.candidate_tag }}
        shell: bash
        run: |
          set -euo pipefail

          docker pull "$CANDIDATE_TAG"

          tags=(
            "${{ env.IMAGE_PREFIX }}/vivd-studio:${{ needs.detect-changes.outputs.version }}"
            "${{ env.IMAGE_PREFIX }}/vivd-studio:${{ needs.detect-changes.outputs.version_no_v }}"
            "${{ env.IMAGE_PREFIX }}/vivd-studio:latest"
          )

          for tag in "${tags[@]}"; do
            docker tag "$CANDIDATE_TAG" "$tag"
            docker push "$tag"
          done

  build-builder:
    needs: [detect-changes, validate-release]
    if: needs.detect-changes.outputs.build_builder == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push vivd-builder
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/builder/Dockerfile
          target: prod
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vivd-builder:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/vivd-builder:${{ needs.detect-changes.outputs.version_no_v }}
            ${{ env.IMAGE_PREFIX }}/vivd-builder:latest
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

  build-server:
    needs: [detect-changes, validate-release]
    if: needs.detect-changes.outputs.build_server == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 23

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build vivd-server release candidate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/backend/Dockerfile
          target: prod
          platforms: linux/amd64
          load: true
          build-args: |
            VIVD_IMAGE_VERSION=${{ needs.detect-changes.outputs.version }}
            VIVD_IMAGE_REVISION=${{ github.sha }}
          tags: vivd-server:release-smoke
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Smoke test vivd-server release candidate
        env:
          BACKEND_IMAGE: vivd-server:release-smoke
        run: node ./scripts/backend-image-smoke.mjs

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Tag and push smoked vivd-server image
        shell: bash
        run: |
          set -euo pipefail

          tags=(
            "${{ env.IMAGE_PREFIX }}/vivd-server:${{ needs.detect-changes.outputs.version }}"
            "${{ env.IMAGE_PREFIX }}/vivd-server:${{ needs.detect-changes.outputs.version_no_v }}"
            "${{ env.IMAGE_PREFIX }}/vivd-server:latest"
          )

          for tag in "${tags[@]}"; do
            docker tag vivd-server:release-smoke "$tag"
            docker push "$tag"
          done

  build-ui:
    needs: [detect-changes, validate-release]
    if: needs.detect-changes.outputs.build_ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push vivd-ui
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/frontend/Dockerfile
          target: prod
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vivd-ui:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/vivd-ui:${{ needs.detect-changes.outputs.version_no_v }}
            ${{ env.IMAGE_PREFIX }}/vivd-ui:latest
          cache-from: type=gha,scope=ui
          cache-to: type=gha,mode=max,scope=ui

  build-docs:
    needs: [detect-changes, validate-release]
    if: needs.detect-changes.outputs.build_docs == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push vivd-docs
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/docs/Dockerfile
          target: prod
          build-args: |
            VIVD_DOCS_SITE_URL=https://docs.vivd.studio
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vivd-docs:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/vivd-docs:${{ needs.detect-changes.outputs.version_no_v }}
            ${{ env.IMAGE_PREFIX }}/vivd-docs:latest
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs

  build-scraper:
    needs: [detect-changes, validate-release]
    if: needs.detect-changes.outputs.build_scraper == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 23

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build vivd-scraper release candidate image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/scraper
          file: ./packages/scraper/Dockerfile
          platforms: linux/amd64
          load: true
          tags: vivd-scraper:release-smoke
          cache-from: type=gha,scope=scraper
          cache-to: type=gha,mode=max,scope=scraper

      - name: Smoke test vivd-scraper release candidate
        env:
          SCRAPER_IMAGE: vivd-scraper:release-smoke
        run: node ./scripts/scraper-image-smoke.mjs

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Tag and push smoked vivd-scraper image
        shell: bash
        run: |
          set -euo pipefail

          tags=(
            "${{ env.IMAGE_PREFIX }}/vivd-scraper:${{ needs.detect-changes.outputs.version }}"
            "${{ env.IMAGE_PREFIX }}/vivd-scraper:${{ needs.detect-changes.outputs.version_no_v }}"
            "${{ env.IMAGE_PREFIX }}/vivd-scraper:latest"
          )

          for tag in "${tags[@]}"; do
            docker tag vivd-scraper:release-smoke "$tag"
            docker push "$tag"
          done

  build-caddy:
    needs: [detect-changes, validate-release]
    if: needs.detect-changes.outputs.build_caddy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push vivd-caddy
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./caddy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vivd-caddy:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/vivd-caddy:${{ needs.detect-changes.outputs.version_no_v }}
            ${{ env.IMAGE_PREFIX }}/vivd-caddy:latest
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

  deploy:
    needs: [detect-changes, validate-release, publish-studio, build-builder, build-server, build-ui, build-docs, build-scraper, build-caddy]
    if: always() && needs.detect-changes.outputs.any == 'true' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && (needs.detect-changes.outputs.build_studio != 'true' || needs.publish-studio.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy deployments
        run: |
          # Support multiple compose IDs (comma-separated)
          # e.g., DOKPLOY_COMPOSE_IDS="abc123,def456,ghi789"
          IFS=',' read -ra COMPOSE_IDS <<< "${{ secrets.DOKPLOY_COMPOSE_IDS }}"

          for COMPOSE_ID in "${COMPOSE_IDS[@]}"; do
            COMPOSE_ID=$(echo "$COMPOSE_ID" | xargs)  # Trim whitespace
            if [ -n "$COMPOSE_ID" ]; then
              echo "Triggering redeploy for compose: $COMPOSE_ID"
              curl -X POST "${{ secrets.DOKPLOY_URL }}/api/compose.redeploy" \
                -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
                -H "Content-Type: application/json" \
                -d "{\"composeId\": \"$COMPOSE_ID\"}" \
                --fail --silent --show-error
              echo "✓ Deployment triggered for $COMPOSE_ID"
            fi
          done
