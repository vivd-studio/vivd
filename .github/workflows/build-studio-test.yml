name: Build Studio Test Image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or commit SHA)"
        required: true
      image_tag:
        description: "Optional image tag (defaults to flytest-<ref>-<shortsha>)"
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/vivd-studio/vivd-studio

jobs:
  build-and-push-studio-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Determine test image tag
        id: meta
        run: |
          INPUT_TAG="${{ github.event.inputs.image_tag }}"
          if [ -n "$INPUT_TAG" ]; then
            RAW_TAG="$INPUT_TAG"
          else
            REF_INPUT="${{ github.event.inputs.ref }}"
            SHORT_SHA="$(git rev-parse --short=12 HEAD)"
            RAW_TAG="flytest-${REF_INPUT}-${SHORT_SHA}"
          fi

          SAFE_TAG="$(echo "$RAW_TAG" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9._-]+#-#g; s#^-+##; s#-+$##; s#--+#-#g' \
            | cut -c1-128)"

          if [ -z "$SAFE_TAG" ]; then
            echo "Resolved image tag is empty"
            exit 1
          fi

          echo "tag=$SAFE_TAG" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.IMAGE }}:$SAFE_TAG" >> "$GITHUB_OUTPUT"
          echo "Will push image: ${{ env.IMAGE }}:$SAFE_TAG"

      - name: Build and push vivd-studio test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/studio/Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print test image reference
        run: echo "Built image ${{ steps.meta.outputs.image }}"
