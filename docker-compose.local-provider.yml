services:
  backend:
    environment:
      - STUDIO_MACHINE_PROVIDER=local
    develop:
      watch:
        # Local provider runs @vivd/studio inside the backend container.
        # Rebuild backend on Studio changes so the child-process runtime is refreshed.
        - action: rebuild
          path: ./packages/studio

  studio:
    build:
      context: .
      dockerfile: packages/studio/Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3100
      - BRANCH=${STUDIO_BRANCH:-main}
      - REPO_URL=${STUDIO_REPO_URL:-}
      - GIT_TOKEN=${STUDIO_GIT_TOKEN:-}
    volumes:
      - opencode_data:/root/.local/share/opencode/storage
    ports:
      - "3100:3100"
      - "3101:3101"
    networks:
      - vivd-network
    develop:
      watch:
        - action: sync
          path: ./packages/studio
          target: /app/packages/studio
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages/theme
          target: /app/packages/theme
          ignore:
            - node_modules/
        - action: sync
          path: ./packages/shared
          target: /app/packages/shared
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./plugins/sdk
          target: /app/plugins/sdk
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./plugins/installed
          target: /app/plugins/installed
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./plugins/native/analytics
          target: /app/plugins/native/analytics
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./plugins/native/contact-form
          target: /app/plugins/native/contact-form
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./plugins/native/newsletter
          target: /app/plugins/native/newsletter
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./plugins/native/table-booking
          target: /app/plugins/native/table-booking
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./plugins/installed/package.json
        - action: rebuild
          path: ./plugins/sdk/package.json
        - action: rebuild
          path: ./packages/studio/package.json
        - action: rebuild
          path: ./plugins/native/analytics/package.json
        - action: rebuild
          path: ./plugins/native/contact-form/package.json
        - action: rebuild
          path: ./plugins/native/newsletter/package.json
        - action: rebuild
          path: ./plugins/native/table-booking/package.json
        - action: rebuild
          path: ./packages/theme/package.json
        - action: rebuild
          path: ./packages/shared/package.json
    command: npm run dev
