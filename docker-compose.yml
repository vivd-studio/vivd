services:
  caddy:
    image: caddy:2-alpine
    # ports:
    #   - "80:80"
    #   - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_sites:/etc/caddy/sites.d
      - published_sites:/srv/published:ro
      - ./packages/backend/static:/srv/default:ro
    environment:
      - VIVD_PUBLIC_PLUGIN_API_HOST=${VIVD_PUBLIC_PLUGIN_API_HOST:-api.vivd.studio}
    depends_on:
      - backend
    networks:
      - vivd-network

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      target: prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PORT=3000
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - VERTEX_LOCATION=${VERTEX_LOCATION:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - GOOGLE_APPLICATION_CREDENTIALS_JSON=${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}
      - VIVD_GOOGLE_APPLICATION_CREDENTIALS_PATH=${VIVD_GOOGLE_APPLICATION_CREDENTIALS_PATH:-}
      - OPENCODE_MODEL=${OPENCODE_MODEL}
      - OPENCODE_MODELS=${OPENCODE_MODELS:-}
      - DOMAIN=${DOMAIN}
      - TRUSTED_DOMAINS=${TRUSTED_DOMAINS:-}
      - TENANT_BASE_DOMAIN=${TENANT_BASE_DOMAIN:-}
      - TENANT_DOMAIN_ROUTING_ENABLED=${TENANT_DOMAIN_ROUTING_ENABLED:-true}
      - CONTROL_PLANE_HOST=${CONTROL_PLANE_HOST:-}
      - SUPERADMIN_HOSTS=${SUPERADMIN_HOSTS:-}
      - BACKEND_URL=${BACKEND_URL:-}
      - VIVD_PUBLIC_PLUGIN_API_BASE_URL=${VIVD_PUBLIC_PLUGIN_API_BASE_URL:-}
      - PUBLISHED_DIR=/srv/published
      - CADDY_SITES_DIR=/etc/caddy/sites.d
      - CADDY_ADMIN_URL=http://caddy:2019
      - SCRAPER_URL=${SCRAPER_URL:-http://scraper:3001}
      - SCRAPER_API_KEY=${SCRAPER_API_KEY}
      # S3/R2 object storage (studio machine project sync)
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY:-}
      - R2_SECRET_KEY=${R2_SECRET_KEY:-}
      # Studio machines
      - STUDIO_MACHINE_PROVIDER=${STUDIO_MACHINE_PROVIDER:-local}
      - SINGLE_PROJECT_MODE=${SINGLE_PROJECT_MODE:-false}
      # Fly.io studio machines (when STUDIO_MACHINE_PROVIDER=fly)
      - FLY_API_TOKEN=${FLY_API_TOKEN:-}
      - FLY_STUDIO_APP=${FLY_STUDIO_APP:-}
      - FLY_STUDIO_IMAGE_REPO=${FLY_STUDIO_IMAGE_REPO:-}
      - FLY_STUDIO_IMAGE=${FLY_STUDIO_IMAGE:-}
      - FLY_STUDIO_REGION=${FLY_STUDIO_REGION:-}
      - FLY_STUDIO_CPU_KIND=${FLY_STUDIO_CPU_KIND:-shared}
      - FLY_STUDIO_CPUS=${FLY_STUDIO_CPUS:-1}
      - FLY_STUDIO_MEMORY_MB=${FLY_STUDIO_MEMORY_MB:-1024}
      # GitHub sync
      - GITHUB_SYNC_ENABLED=${GITHUB_SYNC_ENABLED:-false}
      - GITHUB_SYNC_STRICT=${GITHUB_SYNC_STRICT:-false}
      - GITHUB_ORG=${GITHUB_ORG:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO_PREFIX=${GITHUB_REPO_PREFIX:-}
      # Usage limits
      - LICENSE_DAILY_CREDIT_LIMIT=${LICENSE_DAILY_CREDIT_LIMIT:-1000}
      - LICENSE_WEEKLY_CREDIT_LIMIT=${LICENSE_WEEKLY_CREDIT_LIMIT:-2500}
      - LICENSE_MONTHLY_CREDIT_LIMIT=${LICENSE_MONTHLY_CREDIT_LIMIT:-5000}
      - LICENSE_IMAGE_GEN_PER_MONTH=${LICENSE_IMAGE_GEN_PER_MONTH:-25}
      - LICENSE_WARNING_THRESHOLD=${LICENSE_WARNING_THRESHOLD:-0.8}
    volumes:
      - backend_data:/app/projects
      - opencode_data:/root/.local/share/opencode/storage
      - published_sites:/srv/published
      - caddy_sites:/etc/caddy/sites.d
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vivd-network

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      target: prod
      args:
        - VITE_APP_ENV=${VITE_APP_ENV}
    depends_on:
      - backend
    networks:
      - vivd-network

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vivd-network

networks:
  vivd-network:

volumes:
  postgres_data:
  backend_data:
  opencode_data:
  caddy_data:
  caddy_config:
  caddy_sites:
  published_sites:
