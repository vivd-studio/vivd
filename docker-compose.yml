services:
  backend:
    build:
      context: ./backend
      target: prod
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PORT=3000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - backend_data:/app/generated
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      target: prod
    depends_on:
      - backend

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  backend_data:
