services:
  caddy:
    image: caddy:2-alpine
    # ports:
    #   - "80:80"
    #   - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_sites:/etc/caddy/sites.d
      - published_sites:/srv/published:ro
      - ./backend/static:/srv/default:ro
    depends_on:
      - backend
    networks:
      - vivd-network

  backend:
    build:
      context: ./backend
      target: prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PORT=3000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENCODE_MODEL=${OPENCODE_MODEL}
      - OPENCODE_MODELS=${OPENCODE_MODELS:-}
      - DOMAIN=${DOMAIN}
      - TRUSTED_DOMAINS=${TRUSTED_DOMAINS:-}
      - PUBLISHED_DIR=/srv/published
      - CADDY_SITES_DIR=/etc/caddy/sites.d
      - CADDY_ADMIN_URL=http://caddy:2019
      - SCRAPER_URL=${SCRAPER_URL:-http://scraper:3001}
      - SCRAPER_API_KEY=${SCRAPER_API_KEY}
      - GITHUB_SYNC_ENABLED=${GITHUB_SYNC_ENABLED:-false}
      - GITHUB_SYNC_STRICT=${GITHUB_SYNC_STRICT:-false}
      - GITHUB_ORG=${GITHUB_ORG:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO_PREFIX=${GITHUB_REPO_PREFIX:-}
      - GITHUB_REMOTE_NAME=${GITHUB_REMOTE_NAME:-origin}
      - GITHUB_REPO_VISIBILITY=${GITHUB_REPO_VISIBILITY:-private}
      - GITHUB_API_URL=${GITHUB_API_URL:-https://api.github.com}
      - GITHUB_GIT_HOST=${GITHUB_GIT_HOST:-github.com}
      - LICENSE_DAILY_CREDIT_LIMIT=${LICENSE_DAILY_CREDIT_LIMIT:-1000}
      - LICENSE_WEEKLY_CREDIT_LIMIT=${LICENSE_WEEKLY_CREDIT_LIMIT:-2500}
      - LICENSE_MONTHLY_CREDIT_LIMIT=${LICENSE_MONTHLY_CREDIT_LIMIT:-5000}
      - LICENSE_IMAGE_GEN_PER_MONTH=${LICENSE_IMAGE_GEN_PER_MONTH:-25}
      - LICENSE_WARNING_THRESHOLD=${LICENSE_WARNING_THRESHOLD:-0.8}
    volumes:
      - backend_data:/app/projects
      - opencode_data:/root/.local/share/opencode/storage
      - published_sites:/srv/published
      - caddy_sites:/etc/caddy/sites.d
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vivd-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
      args:
        - VITE_APP_ENV=${VITE_APP_ENV}
    depends_on:
      - backend
    networks:
      - vivd-network

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vivd-network

networks:
  vivd-network:

volumes:
  postgres_data:
  backend_data:
  opencode_data:
  caddy_data:
  caddy_config:
  caddy_sites:
  published_sites:
