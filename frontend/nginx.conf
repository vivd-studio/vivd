server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve Vivd Studio app - SPA routing
    # Since files are in /usr/share/nginx/html/vivd-studio,
    # requesting /vivd-studio/ should map correctly.
    location /vivd-studio {
        try_files $uri $uri/ /vivd-studio/index.html;
    }
}

