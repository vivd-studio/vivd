# Production Docker Compose - uses pre-built images from GHCR
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Before first use:
# 1. Copy .env.example to .env and configure your environment
# 2. Run: docker compose -f docker-compose.prod.yml pull
# 3. Run: docker compose -f docker-compose.prod.yml up -d
#
# To update to latest images:
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d

services:
  caddy:
    image: ghcr.io/vivd-studio/vivd-caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - caddy_sites:/etc/caddy/sites.d
      - published_sites:/srv/published:ro
    depends_on:
      - backend
    networks:
      - vivd-network

  backend:
    image: ghcr.io/vivd-studio/vivd-server:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PORT=3000
      - _OPENROUTER_API_KEY=${_OPENROUTER_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENCODE_MODEL=${OPENCODE_MODEL}
      - DOMAIN=${DOMAIN}
      - TRUSTED_DOMAINS=${TRUSTED_DOMAINS:-}
      - PUBLISHED_DIR=/srv/published
      - CADDY_SITES_DIR=/etc/caddy/sites.d
      - CADDY_ADMIN_URL=http://caddy:2019
      - GITHUB_SYNC_ENABLED=${GITHUB_SYNC_ENABLED:-false}
      - GITHUB_SYNC_STRICT=${GITHUB_SYNC_STRICT:-false}
      - GITHUB_ORG=${GITHUB_ORG:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO_PREFIX=${GITHUB_REPO_PREFIX:-}
      - GITHUB_REMOTE_NAME=${GITHUB_REMOTE_NAME:-origin}
      - GITHUB_REPO_VISIBILITY=${GITHUB_REPO_VISIBILITY:-private}
      - GITHUB_API_URL=${GITHUB_API_URL:-https://api.github.com}
      - GITHUB_GIT_HOST=${GITHUB_GIT_HOST:-github.com}
    volumes:
      - backend_data:/app/projects
      - opencode_data:/root/.local/share/opencode/storage
      - published_sites:/srv/published
      - caddy_sites:/etc/caddy/sites.d
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vivd-network

  frontend:
    image: ghcr.io/vivd-studio/vivd-ui:latest
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - vivd-network

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vivd-network

networks:
  vivd-network:

volumes:
  postgres_data:
  backend_data:
  opencode_data:
  caddy_data:
  caddy_config:
  caddy_sites:
  published_sites:
